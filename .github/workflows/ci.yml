name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:

env:
  SDL3_VERSION: "3.2.8"
  VULKAN_SDK_VERSION: "1.4.304.1"

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# ---------------------------------------------------------------------------
# Lint jobs (fast, Linux-only, all run in parallel)
# ---------------------------------------------------------------------------

jobs:
  lint:
    name: HLint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: haskell-actions/hlint-setup@v2
        with:
          version: '3.8'
      - uses: haskell-actions/hlint-run@v2
        with:
          path: '["src/", "src-ffi/", "test/"]'
          fail-on: warning

  format:
    name: Ormolu
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: haskell-actions/run-ormolu@v17
        with:
          pattern: |
            src/**/*.hs
            src-ffi/**/*.hs
            test/**/*.hs

  c-check:
    name: C99 Strict
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq libvulkan-dev pkg-config cmake ninja-build \
            libwayland-dev libxkbcommon-dev libx11-dev libxext-dev libxrandr-dev

          # SDL3: build from source (not in Ubuntu repos yet)
          if ! pkg-config --exists sdl3 2>/dev/null; then
            git clone --depth 1 --branch release-${{ env.SDL3_VERSION }} \
              https://github.com/libsdl-org/SDL.git /tmp/SDL3
            cmake -S /tmp/SDL3 -B /tmp/SDL3/build -G Ninja \
              -DCMAKE_BUILD_TYPE=Release \
              -DSDL_SHARED=ON -DSDL_STATIC=OFF \
              -DSDL_TEST=OFF -DSDL_EXAMPLES=OFF
            cmake --build /tmp/SDL3/build
            sudo cmake --install /tmp/SDL3/build
            sudo ldconfig
          fi

      - name: Compile C99 sources (syntax + warnings)
        run: |
          for f in cbits/nv_*.c; do
            echo "checking $f"
            cc -std=c99 -Wall -Wextra -Wpedantic -Werror -fsyntax-only \
              -I cbits \
              $(pkg-config --cflags vulkan) \
              $(pkg-config --cflags sdl3) \
              "$f"
          done

      - name: Compile C++ VMA wrapper (syntax)
        run: |
          c++ -std=c++14 -fsyntax-only -w \
            -I cbits \
            $(pkg-config --cflags vulkan) \
            cbits/nv_vma.cpp

  shader-check:
    name: Shader Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install glslangValidator
        run: sudo apt-get install -y -qq glslang-tools
      - name: Validate shaders
        run: |
          for f in shaders/*.vert shaders/*.frag shaders/*.comp; do echo "validating $f"; glslangValidator --target-env vulkan1.0 "$f"; done

  # ---------------------------------------------------------------------------
  # Packaging check (Linux-only)
  # ---------------------------------------------------------------------------

  cabal-check:
    name: Cabal Check
    needs: [c-check]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: haskell-actions/setup@v2
        with:
          ghc-version: '9.8'
          cabal-version: 'latest'
      - run: cabal check

  # ---------------------------------------------------------------------------
  # Build (cross-platform matrix — C + Haskell)
  # ---------------------------------------------------------------------------

  build:
    name: Build (${{ matrix.name }})
    needs: [cabal-check, shader-check]
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            name: Linux
          - os: macos-latest
            name: macOS
          - os: windows-latest
            name: Windows
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - name: Install system deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq libvulkan-dev pkg-config \
            libwayland-dev libxkbcommon-dev libx11-dev libxext-dev libxrandr-dev

          # SDL3: build from source if not packaged
          if ! pkg-config --exists sdl3 2>/dev/null; then
            sudo apt-get install -y -qq cmake ninja-build
            git clone --depth 1 --branch release-${{ env.SDL3_VERSION }} \
              https://github.com/libsdl-org/SDL.git /tmp/SDL3
            cmake -S /tmp/SDL3 -B /tmp/SDL3/build -G Ninja \
              -DCMAKE_BUILD_TYPE=Release \
              -DSDL_SHARED=ON -DSDL_STATIC=OFF \
              -DSDL_TEST=OFF -DSDL_EXAMPLES=OFF
            cmake --build /tmp/SDL3/build
            sudo cmake --install /tmp/SDL3/build
            sudo ldconfig
          fi

      - name: Install system deps (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install sdl3 vulkan-headers vulkan-loader molten-vk

      - name: Install system deps (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          # Vulkan SDK
          $VK_VERSION = "${{ env.VULKAN_SDK_VERSION }}"
          $VK_URL = "https://sdk.lunarg.com/sdk/download/$VK_VERSION/windows/VulkanSDK-$VK_VERSION-Installer.exe"
          Invoke-WebRequest -Uri $VK_URL -OutFile "$env:TEMP\vulkan-sdk.exe"
          Start-Process -Wait -FilePath "$env:TEMP\vulkan-sdk.exe" -ArgumentList "--accept-licenses --default-answer --confirm-command install"
          $env:VULKAN_SDK = "C:\VulkanSDK\$VK_VERSION"
          echo "VULKAN_SDK=$env:VULKAN_SDK" >> $env:GITHUB_ENV
          echo "$env:VULKAN_SDK\Bin" >> $env:GITHUB_PATH

          # SDL3 (pre-built dev libs)
          $SDL_VERSION = "${{ env.SDL3_VERSION }}"
          $SDL_URL = "https://github.com/libsdl-org/SDL/releases/download/release-$SDL_VERSION/SDL3-devel-$SDL_VERSION-mingw.zip"
          Invoke-WebRequest -Uri $SDL_URL -OutFile "$env:TEMP\sdl3.zip"
          Expand-Archive -Path "$env:TEMP\sdl3.zip" -DestinationPath "$env:TEMP\sdl3"
          $SDL_DIR = "$env:TEMP\sdl3\SDL3-$SDL_VERSION\x86_64-w64-mingw32"

          # pkg-config (via choco)
          choco install pkgconfiglite -y

          # Vulkan SDK on Windows has no .pc file — create one for cabal
          $PC_DIR = "$env:VULKAN_SDK\Lib\pkgconfig"
          New-Item -ItemType Directory -Force -Path $PC_DIR | Out-Null
          $prefix = $env:VULKAN_SDK -replace '\\','/'
          @"
          prefix=$prefix
          libdir=`${prefix}/Lib
          includedir=`${prefix}/Include

          Name: Vulkan-Loader
          Description: Vulkan Loader
          Version: $VK_VERSION
          Libs: -L`${libdir} -lvulkan-1
          Cflags: -I`${includedir}
          "@ -replace '(?m)^          ','' | Out-File -FilePath "$PC_DIR\vulkan.pc" -Encoding ascii

          # Write combined PKG_CONFIG_PATH once (multiple writes overwrite each other)
          echo "PKG_CONFIG_PATH=$SDL_DIR\lib\pkgconfig;$PC_DIR" >> $env:GITHUB_ENV
          # SDL3.dll must be on PATH for test exe to run
          echo "$SDL_DIR\bin" >> $env:GITHUB_PATH

      - uses: haskell-actions/setup@v2
        id: setup-haskell
        with:
          ghc-version: '9.8'
          cabal-version: 'latest'

      - name: Cache Cabal store
        uses: actions/cache@v5
        with:
          path: ${{ steps.setup-haskell.outputs.cabal-store }}
          key: cabal-${{ runner.os }}-v2-${{ hashFiles('nova-engine.cabal') }}
          restore-keys: cabal-${{ runner.os }}-v2-

      - name: Build
        run: cabal build --enable-tests --ghc-options="-Werror"

      - name: Test
        run: cabal test --enable-tests --ghc-options="-Werror" --test-show-details=streaming

      - name: Haddock
        if: matrix.name == 'Linux'
        run: cabal haddock --enable-tests
